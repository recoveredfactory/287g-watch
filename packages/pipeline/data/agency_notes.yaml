# Editorial notes overlay
#
# Hand-maintained per-agency annotations merged into agency_index.json by
# ingest.ts. Keys are agency slugs (matching the slug field in the index).
#
# Each note has:
#   kind          — note category. Recognized so far: `related_agency`.
#   related_slug  — (optional) slug of a related agency to link to.
#   text          — display text rendered in the callout.
#
# Add an entry when readers need context the raw data cannot convey —
# e.g. two records that likely refer to the same body, jurisdictional
# quirks, data caveats.

miami-dade-corrections-and-rehabilitation-fl:
  - kind: related_agency
    related_slug: miami-dade-sheriffs-office-fl
    text: >-
      Shares an Originating Agency Identifier (ORI FL0130000) with the
      Miami-Dade Sheriff's Office — by the FBI's accounting, the two records
      are the same institution. In the ICE data, the Task Force Model
      agreement is filed under the Sheriff's Office and the Warrant Service
      Officer agreement is filed under Corrections and Rehabilitation.

miami-dade-sheriffs-office-fl:
  - kind: related_agency
    related_slug: miami-dade-corrections-and-rehabilitation-fl
    text: >-
      Shares an Originating Agency Identifier (ORI FL0130000) with Miami-Dade
      Corrections and Rehabilitation — by the FBI's accounting, the two
      records are the same institution. In the ICE data, the Task Force Model
      agreement is filed under the Sheriff's Office and the Warrant Service
      Officer agreement is filed under Corrections and Rehabilitation.
