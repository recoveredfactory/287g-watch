# Data refresh: re-run the ingest pipeline, and if the dataset actually changed,
# redeploy the site and re-bake/publish the map video + OG cards. Mirrors the
# manual release flow in ARCHITECTURE.md ("Map assets & releasing").
#
# Triggers: twice-daily cron (data), weekly Monday cron (news), and manual
# workflow_dispatch (stage/force/build_news inputs).
#
# Required repo config (Settings → Secrets and variables → Actions):
#   Secret   AWS_ROLE_ARN        IAM role for GitHub OIDC to assume (sst deploy + s3)
#   Variable WEB_DOMAIN          e.g. 287g.recoveredfactory.net   (prod site host)
#   Variable WEB_STAGING_DOMAIN  e.g. staging.287g.recoveredfactory.net
#   Variable AWS_REGION          optional; defaults to us-east-1
# GITHUB_TOKEN is the built-in Actions token — the pipeline uses it for the
# (public) appelson/Tracking_287g GitHub API reads.
#
# MOA signer/contact extraction (issue #225): ingest needs the gitignored
# data/moa_extracts.json or it ships null moa_poc_*/ice_signer_*/agreements[]
# fields. The refresh job builds it (poppler pdftotext + regex over the
# upstream MOA PDFs — no LLM) behind an actions/cache, and hard-fails the run
# if it can't, so a refresh can never again silently strip those fields.
#
# News summaries (issue #220):
#   Secret PQL_NEWS_URL, PQL_NEWS_TOKEN — the PromptQL saved-program endpoint.
# News is built in FULL weekly (the Monday cron below) or on demand (dispatch
# with build_news=true) — each PromptQL call takes ~2 min even server-cached, so
# building every state on every refresh added ~20 min of larger-runner time per
# tick for summaries that barely move day to day. Every other run carries the
# live site's summaries forward unchanged (the fallback step doubles as the
# normal path) — except for the states whose DATA moved on that tick, which get
# a targeted rebuild (issue #233; see the detect step). That keeps a state's
# prose from trailing its own numbers by up to a week, at a handful of states'
# worth of cost, and the weekly full build stays the catch-all for language that
# moves on its own. Either way, CI runs `pnpm news` plain (never --force): the
# program runs on its own schedule and caches results server-side, so plain
# calls replay the latest gathered content. If the build fails (PromptQL
# outage, missing secrets on a fork), the same carry-forward kicks in so a
# refresh can't wipe the live summaries. Google News link resolution may not
# work from Actions IPs — unresolved links stay as gnews redirects (still
# clickable; the browser resolves them); whatever does resolve is kept in an
# actions/cache so later runs don't redo it. A news-only change redeploys the
# site but skips the video/OG bake and the social post — those are
# data-driven and nothing in them reads news.
#
# Bake compute (issue #186 — the video bake is GPU-accelerated to beat the
# timeout). Both default safely so an unconfigured repo still runs (slow):
#   Variable BAKE_RUNNER_LABEL  label of a GPU larger runner created in org
#                               Settings → Actions → Runners (e.g. gpu-t4).
#                               Defaults to ubuntu-latest.
#   Variable BAKE_GL            gpu | swiftshader. Set to `gpu` ONLY alongside a
#                               GPU BAKE_RUNNER_LABEL. Default swiftshader
#                               (software WebGL — works anywhere, but slow).
# With BAKE_GL=gpu the bake runs headed under xvfb and FAILS LOUD if it can't
# reach the GPU (so you never silently pay GPU minutes for a software bake).
#
# Social posting (the `post-social` job). YouTube is auto-uploaded PRIVATELY to
# the prod channel (an unverified Google API project force-locks uploads to
# private anyway, so nothing goes public unattended); Instagram is MANUAL for
# now — instead of posting, the job emails you the public video URL + caption to
# post by hand, alongside the YouTube Studio "publish" page for the upload.
#   Environments  staging, prod   (Settings → Environments) — scope the YouTube
#                                  token so a staging run can't read prod's.
#   Repo secret   YOUTUBE_CLIENT_ID, YOUTUBE_CLIENT_SECRET   (one OAuth app)
#   Env secret    YOUTUBE_REFRESH_TOKEN   per environment — burner channel in
#                                         `staging`, real channel in `prod`
#                                         (mint with youtube-auth.mjs).
#   Repo var      NOTIFY_EMAIL_FROM  SES-verified sender; NOTIFY_EMAIL_TO  the
#                                    recipient(s). Unset → notifications log only.
# See docs/SOCIAL_UPLOAD.md for the full (mostly manual) setup.

name: Data refresh

on:
  workflow_dispatch:
    inputs:
      stage:
        description: Deploy stage
        type: choice
        options: [staging, prod]
        # Manual runs default to staging (de-risk the bake). The schedule/push
        # triggers below have no inputs, so they fall through to the `|| 'prod'`
        # defaults further down — cron still lands on prod.
        default: staging
      force:
        description: Deploy + re-bake even if the data is unchanged
        type: boolean
        default: false
      post_social:
        description: "Social — post: upload YouTube (private) + email you to publish & post IG. dry-run: print the plan only."
        type: choice
        options: [post, dry-run]
        default: post
      build_news:
        description: Build fresh news summaries (default carries the live site's forward)
        type: boolean
        default: false
  # Twice daily, both AFTER the upstream auto-commit window: appelson/
  # Tracking_287g lands its daily "Auto-commit from GitHub Actions" around
  # 17:00–20:00 UTC. 21:00 catches that day's update; 01:00 is a safety net for
  # a late or re-run upstream push. No inputs on this trigger, so it falls
  # through to the `|| 'prod'` defaults below (deploys prod). The change-gate
  # hashes the fresh JSON against the LIVE site, so the second run no-ops once
  # the first has published — at most one deploy+bake per actual upstream
  # change, however often we poll.
  schedule:
    - cron: "0 21 * * *" # 21:00 UTC — primary, just after upstream lands
    - cron: "0 1 * * *"  # 01:00 UTC — safety net for a late upstream push
    # Weekly news build — Monday 14:00 UTC (morning US). ONLY this tick builds
    # fresh news (matched by string in BUILD_NEWS below — keep them in sync);
    # the daily ticks above carry the live summaries forward.
    - cron: "0 14 * * 1"

# Don't let two refreshes for the same stage clobber each other mid-deploy.
concurrency:
  group: data-refresh-${{ inputs.stage || 'prod' }}
  cancel-in-progress: false

permissions:
  id-token: write # OIDC: assume the AWS role
  contents: read

jobs:
  refresh:
    # GPU larger runner when configured (issue #186), else the standard runner.
    runs-on: ${{ vars.BAKE_RUNNER_LABEL || 'ubuntu-latest' }}
    # 45 for ingest+deploy+bake, plus the news build's 40-min step cap
    # (~53 PromptQL calls at ~2 min each, prefetched concurrently → ~20 min
    # typical; Monday/dispatch runs only) and the MOA extract's 30-min cap
    # (cold cache ~15 min, warm seconds). Backstop only — those steps must
    # time out at the STEP level, not here: a job timeout cancels everything
    # downstream (news fallback, cache saves, deploy).
    timeout-minutes: 90
    # Exposed to the post-social job: whether to post at all, and the caption date.
    outputs:
      data_changed: ${{ steps.gate.outputs.data_changed }}
      snapshot_date: ${{ steps.snapshot.outputs.date }}
      # Read by the news-health job to fail the workflow on a dead news build.
      news_failed: ${{ steps.news_health.outputs.news_failed }}
      # Immutable per-release video keys for the social email (see the archive step).
      map_trend_archive_en: ${{ steps.archive.outputs.map_trend_archive_en }}
      map_trend_archive_es: ${{ steps.archive.outputs.map_trend_archive_es }}
    env:
      STAGE: ${{ inputs.stage || 'prod' }}
      FORCE: ${{ inputs.force || 'false' }}
      WEB_DOMAIN: ${{ vars.WEB_DOMAIN }}
      WEB_STAGING_DOMAIN: ${{ vars.WEB_STAGING_DOMAIN }}
      BAKE_GL: ${{ vars.BAKE_GL || 'swiftshader' }}
      # News is expensive (~20 min of PromptQL calls): build only on the weekly
      # Monday cron (string-matched against the schedule entry above) or an
      # explicit build_news dispatch. Everything else carries the live
      # summaries forward.
      BUILD_NEWS: ${{ (github.event.schedule == '0 14 * * 1' || inputs.build_news == true) && 'true' || 'false' }}
    steps:
      # Actions are pinned to commit SHAs (not mutable tags) so a hijacked tag
      # can't inject code that exfiltrates GITHUB_TOKEN or abuses the OIDC step.
      # Bump deliberately (Dependabot or by hand); trailing comment is the tag.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # ── MOA signer/contact extraction (issue #225) ─────────────────────
      # ingest §7b enriches agencies from data/moa_extracts.json. That file is
      # gitignored, and until these steps existed CI ran ingest without it —
      # silently shipping null moa_poc_*/ice_signer_*/agreements[] fields to
      # prod (2026-07-02, see #225). The extract is incremental (resumes from
      # existing output), so with the cache below steady-state runs only
      # process new or previously-errored agencies. These steps FAIL THE JOB
      # on error — a failed refresh deploys nothing, which beats silently
      # publishing a field-less dataset.
      - name: Install poppler (pdftotext for MOA extraction)
        run: pdftotext -v >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y poppler-utils)

      - name: Restore MOA extracts cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/pipeline/data/moa_extracts.json
          key: moa-extracts-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: moa-extracts-

      # Refresh the committed agreement index against upstream (~85 API
      # calls), then extract signers/POCs from any PDFs not already covered.
      # Step-level timeout so the JOB timeout can never be what kills this
      # mid-run (that would cancel the cache save below and lose the
      # progress); the script persists after each agency, so even a timed-out
      # run leaves a bigger cache for the next tick to resume from. A cold
      # cache is ~15 min; warm is seconds. The trailing `test -s` catches the
      # exits-zero-but-wrote-nothing case so ingest can't quietly null the
      # fields again.
      - name: Extract MOA signers & contacts
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm -F pipeline build:agreement-index
          pnpm -F pipeline extract:moa-signers
          test -s packages/pipeline/data/moa_extracts.json

      - name: Save MOA extracts cache
        if: always() && hashFiles('packages/pipeline/data/moa_extracts.json') != ''
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/pipeline/data/moa_extracts.json
          key: moa-extracts-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Run ingest pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm pipeline

      # ── Keep the language in step with the numbers (issue #233) ─────────
      # Data refreshes twice daily; the FULL news build is weekly, so a state's
      # roster could sit up to a week ahead of the prose describing it. Diff what
      # ingest just produced against the live site and hand the changed states to
      # the news step below, which refreshes only those. Cheap by design: a plain
      # per-state call rides PromptQL's server-side cache (~2 min, no re-gather),
      # so a normal day's handful of states costs minutes, not the full ~20.
      #
      # The diff is a NARROW projection (roster membership, models, signed and
      # terminated dates) — see diff-states.ts for why the whole record would
      # flag all 53 states on every ICE release and defeat the point.
      #
      # continue-on-error: this is an optimization layered on top of the weekly
      # build, never a gate for it. If it breaks, the list comes back empty, no
      # targeted refresh runs, and Monday's full build still catches the state —
      # far better than blocking a data deploy over a news nicety.
      - name: Detect data-changed states
        id: changed
        continue-on-error: true
        run: |
          case "$STAGE" in
            prod) HOST="$WEB_DOMAIN" ;;
            staging) HOST="$WEB_STAGING_DOMAIN" ;;
            *) echo "Unknown stage: $STAGE" >&2; exit 1 ;;
          esac
          pnpm -F pipeline diff:states --host="$HOST" --out=/tmp/changed-states.txt
          echo "states=$(cat /tmp/changed-states.txt)" >> "$GITHUB_OUTPUT"

      # THE BASELINE for every refresh: whatever the live site already serves.
      # On daily refreshes (news step skipped) it's the whole payload — without
      # it a refresh would build against an empty (gitignored) news dir and
      # silently wipe the summaries. On a first deploy (nothing live yet) it
      # no-ops and the pages fall back to their no-summary state.
      #
      # It runs BEFORE the build so it doubles as the fallback: the build
      # overwrites the states it rebuilds, and any state it fails on just keeps
      # the last-good copy seeded here. That ordering is what makes a PARTIAL
      # build safe — pre-#234 this ran after the build and replaced everything
      # or nothing, so surviving a per-state failure would have dropped that
      # state's summary from the site entirely.
      - name: Carry forward news summaries from the live site
        run: |
          case "$STAGE" in
            prod) HOST="$WEB_DOMAIN" ;;
            staging) HOST="$WEB_STAGING_DOMAIN" ;;
            *) echo "Unknown stage: $STAGE" >&2; exit 1 ;;
          esac
          NEWS_DIR=packages/web/static/data/dist/news
          mkdir -p "$NEWS_DIR"
          base="https://$HOST/data/dist/news"
          if ! curl -fsSL --retry 3 "$base/index.json" -o "$NEWS_DIR/index.json"; then
            echo "no live news to carry forward (first deploy?) — skipping"
            exit 0
          fi
          for abbr in $(node -p "require('./$NEWS_DIR/index.json').states.map(s=>s.abbr).join(' ')"); do
            curl -fsSL --retry 3 "$base/$abbr.json" -o "$NEWS_DIR/$abbr.json" \
              || { echo "::warning::news/$abbr.json missing on live site"; rm -f "$NEWS_DIR/$abbr.json"; }
          done
          echo "carried $(ls "$NEWS_DIR" | wc -l) news files from https://$HOST"

      # Resolved gnews→publisher URLs survive across runs so each news build
      # only resolves links it hasn't seen. Saved under a per-run key below
      # (cache keys are immutable); restore-keys picks up the newest previous
      # run's. Only touched on news-building runs.
      - name: Restore gnews link-resolution cache
        if: env.BUILD_NEWS == 'true'
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/pipeline/data/gnews_cache.json
          key: gnews-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: gnews-cache-

      # Build the per-state news summaries against the PromptQL saved program.
      # Two ways in: the weekly Monday cron / build_news dispatch rebuilds ALL
      # states (see BUILD_NEWS above), and a daily tick rebuilds just the states
      # whose data moved (see the detect step above, #233). Neither runs → the
      # carry-forward above is the whole story and this step skips.
      # Plain call — NEVER --force here: the program refreshes on its own
      # schedule and caches server-side, so this replays the latest gathered
      # content (the local raw cache is gitignored → empty every CI run, which
      # is exactly the plain-call behavior we want; the script prefetches the
      # ~2-min-each program responses concurrently). continue-on-error + the
      # step timeout: a failure OR overrun leaves the carry-forward baseline
      # seeded above in place instead of failing the refresh — a news outage
      # shouldn't block a data deploy. The job-level timeout must never be what
      # stops this step, because that cancels the whole job (deploy included).
      # Silence is not success, though: the script exits non-zero when NOTHING
      # built fresh, and the news-health job below turns the run red. See #234.
      - name: Build news summaries
        id: news
        if: env.BUILD_NEWS == 'true' || steps.changed.outputs.states != ''
        continue-on-error: true
        timeout-minutes: 40
        env:
          PQL_NEWS_URL: ${{ secrets.PQL_NEWS_URL }}
          PQL_NEWS_TOKEN: ${{ secrets.PQL_NEWS_TOKEN }}
          CHANGED_STATES: ${{ steps.changed.outputs.states }}
        run: |
          if [ "$BUILD_NEWS" = 'true' ]; then
            echo "Full rebuild (weekly cron or build_news dispatch) — all states."
            pnpm news
          elif [ -n "$CHANGED_STATES" ]; then
            echo "Targeted refresh — data changed in: $CHANGED_STATES"
            # Unquoted on purpose: the list is a space-separated argv for the
            # script (abbrs only — diff:states filters to states.ts).
            pnpm news $CHANGED_STATES
          else
            # Unreachable via the `if` above, and it must stay that way: a bare
            # `pnpm news` means ALL 53 states, so an empty variable silently
            # becoming a full build is exactly the fallthrough to refuse.
            echo "::error title=Empty state list::Reached the news build with nothing to build."
            exit 1
          fi

      # always() + hashFiles guard: save whatever resolved even when the build
      # failed partway (the script persists after each state), but skip cleanly
      # if the file never came into being (save errors on a missing path).
      - name: Save gnews link-resolution cache
        if: always() && env.BUILD_NEWS == 'true' && hashFiles('packages/pipeline/data/gnews_cache.json') != ''
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: packages/pipeline/data/gnews_cache.json
          key: gnews-cache-${{ github.run_id }}-${{ github.run_attempt }}

      # continue-on-error keeps a news failure from blocking the data deploy, but
      # it also makes the step's CONCLUSION 'success' (only its OUTCOME stays
      # 'failure') — which is precisely how a dead token sat green for a week in
      # #234. Hoist the real verdict into a job output so the news-health job can
      # fail the WORKFLOW without failing this job (post-social is `needs:
      # refresh` without always(), so failing here would silently skip the social
      # post on data-changed days). always(): a skipped/failed news step must
      # still record a verdict.
      - name: Flag news build health
        id: news_health
        if: always()
        env:
          CHANGED_STATES: ${{ steps.changed.outputs.states }}
        run: |
          news_outcome='${{ steps.news.outcome }}'
          # "Did we try to build?" is no longer just BUILD_NEWS — the daily
          # targeted refresh (#233) runs the same step, and a failure there is
          # just as loud: that state's language is now knowably behind its own
          # data. The step's `if` is the single source of truth for whether we
          # tried, so read the answer back off the outcome ('skipped' = nothing
          # to build) instead of restating the condition here and letting the
          # two drift apart.
          # Only two outcomes are quiet, and they're both positively stated:
          # 'success' (it built) and 'skipped' (we never tried). ANYTHING else —
          # failure, cancelled, or an empty outcome from severed plumbing — is
          # loud. Never infer success from the absence of a signal (#234).
          case "$news_outcome" in
            success|skipped) verdict=false ;;
            *) verdict=true ;;
          esac
          echo "news_failed=$verdict" >> "$GITHUB_OUTPUT"
          # Echo the verdict AND its inputs. news-health skips on 'false' AND on an
          # empty/severed output alike, so without this a log can't tell a healthy
          # run from broken plumbing — the same "silence reads as success" trap
          # this whole ticket is about (#234). Don't make the next person guess.
          echo "news_failed=$verdict (BUILD_NEWS=$BUILD_NEWS, changed states=${CHANGED_STATES:-<none>}, news step outcome=${news_outcome:-<none>})"

      # Hash the freshly-built JSON against what's live. Two separate verdicts:
      # data_changed drives the full deploy + bake + social release, while a
      # news-only change gets a plain site deploy (nothing in the bake or the
      # social post reads news). If neither moved, skip everything.
      - name: Change gate
        id: gate
        run: |
          case "$STAGE" in
            prod) HOST="$WEB_DOMAIN" ;;
            staging) HOST="$WEB_STAGING_DOMAIN" ;;
            *) echo "Unknown stage: $STAGE" >&2; exit 1 ;;
          esac
          data_changed=false
          for f in agency_index state_meta terminated_agencies; do
            local_hash=$(sha256sum "packages/web/static/data/dist/$f.json" | awk '{print $1}')
            if curl -fsSL --retry 3 "https://$HOST/data/dist/$f.json" -o /tmp/remote.json; then
              remote_hash=$(sha256sum /tmp/remote.json | awk '{print $1}')
            else
              remote_hash=missing
            fi
            echo "$f: local=$local_hash remote=$remote_hash"
            [ "$local_hash" != "$remote_hash" ] && data_changed=true
          done
          # News: compare per-state content stamps (built_at — when the PromptQL
          # program actually gathered), NOT file hashes. generated_at is a fresh
          # write-clock every build and gnews link resolution varies run-to-run,
          # so hashing would deploy on every refresh. When the carry-forward
          # brought the live files over, local == remote and this stays quiet.
          news_changed=false
          news_index=packages/web/static/data/dist/news/index.json
          local_news=$(node -p "JSON.stringify(require('./$news_index').states.map(s=>[s.abbr,s.built_at]))" 2>/dev/null || echo local-missing)
          if curl -fsSL --retry 3 "https://$HOST/data/dist/news/index.json" -o /tmp/news-index.json; then
            remote_news=$(node -p "JSON.stringify(require('/tmp/news-index.json').states.map(s=>[s.abbr,s.built_at]))" 2>/dev/null || echo remote-missing)
          else
            remote_news=remote-missing
          fi
          if [ "$local_news" != "$remote_news" ]; then
            echo "news: built_at stamps differ (or one side missing)"
            # Nothing on either side (no live news yet AND the local build +
            # fallback both came up empty) → not a change, just absence.
            [ "$local_news" = "local-missing" ] && [ "$remote_news" = "remote-missing" ] || news_changed=true
          else
            echo "news: built_at stamps match"
          fi
          if [ "$FORCE" = "true" ]; then
            echo "force=true → full deploy regardless of change gate"
            data_changed=true
          fi
          echo "data_changed=$data_changed" >> "$GITHUB_OUTPUT"
          echo "news_changed=$news_changed" >> "$GITHUB_OUTPUT"
          echo "### Data refresh ($STAGE): data_changed=$data_changed news_changed=$news_changed" >> "$GITHUB_STEP_SUMMARY"

      # Expose the ICE release date (latest snapshot) for the social caption.
      - name: Read snapshot date
        id: snapshot
        if: steps.gate.outputs.data_changed == 'true'
        run: |
          d=$(node -p "(require('./packages/web/static/data/dist/agency_index.json').find(a=>a.snapshot_date)||{}).snapshot_date?.slice(0,10)||''")
          echo "date=$d" >> "$GITHUB_OUTPUT"

      # Everything below only runs when the dataset moved (or --force).
      - name: Install chromium for bakes
        if: steps.gate.outputs.data_changed == 'true'
        # playwright-chromium auto-download is disabled in pnpm-workspace.yaml
        # (allowBuilds), so fetch the browser + system libs explicitly.
        run: pnpm --filter web exec playwright install --with-deps chromium

      # GPU path only: headed Chromium needs a display. (NVIDIA drivers are
      # already on the GPU runner image.)
      - name: Install xvfb (GPU bake)
        if: steps.gate.outputs.data_changed == 'true' && env.BAKE_GL == 'gpu'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Ensure ffmpeg
        if: steps.gate.outputs.data_changed == 'true'
        run: ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)

      - name: Deploy + bake + publish assets
        if: steps.gate.outputs.data_changed == 'true'
        # Under BAKE_GL=gpu the bake runs headed → wrap in a virtual display.
        run: |
          if [ "$BAKE_GL" = "gpu" ]; then
            xvfb-run -a pnpm "deploy:${STAGE}:assets"
          else
            pnpm "deploy:${STAGE}:assets"
          fi

      # Recompute the immutable per-release archive object keys so the social
      # email can link them instead of the moving -latest (safer for the delayed
      # manual IG post — -latest is overwritten by the next refresh). Same baked
      # file + snapshot date + sha256[:8] that publish-map-assets.mjs used, so the
      # key is byte-identical to the object it just uploaded.
      - name: Archive video keys (for the social email)
        id: archive
        if: steps.gate.outputs.data_changed == 'true'
        env:
          DATE: ${{ steps.snapshot.outputs.date }}
        run: |
          for lang in en es; do
            f="packages/web/.assets/video/map-trend-$lang.mp4"
            if [ -f "$f" ]; then
              h=$(sha256sum "$f" | cut -c1-8)
              key="map-trend-$DATE-$h-$lang.mp4"
              echo "map_trend_archive_$lang=$key" >> "$GITHUB_OUTPUT"
              echo "  $lang → $key"
            else
              echo "  $lang → (no baked file; email falls back to -latest)"
            fi
          done

      # News moved but the dataset didn't: redeploy the site so the fresh
      # summaries go live, skipping the (slow, data-driven) video/OG bake and
      # the social release — nothing in either reads news.
      - name: Deploy site only (news-only change)
        if: steps.gate.outputs.data_changed != 'true' && steps.gate.outputs.news_changed == 'true'
        run: pnpm "deploy:${STAGE}"

      - name: Summary
        if: always()
        env:
          DATA_CHANGED: ${{ steps.gate.outputs.data_changed }}
          NEWS_CHANGED: ${{ steps.gate.outputs.news_changed }}
          NEWS_FAILED: ${{ steps.news_health.outputs.news_failed }}
          CHANGED_STATES: ${{ steps.changed.outputs.states }}
          CHANGED_OUTCOME: ${{ steps.changed.outcome }}
        run: |
          if [ "$DATA_CHANGED" = "true" ]; then
            echo "Deployed $STAGE and refreshed map video + OG cards." >> "$GITHUB_STEP_SUMMARY"
          elif [ "$NEWS_CHANGED" = "true" ]; then
            echo "News-only change — deployed $STAGE without re-baking assets or posting social." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No change in the upstream snapshot — nothing deployed." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$BUILD_NEWS" != "true" ] && [ -n "$CHANGED_STATES" ]; then
            echo "Refreshed news for the states whose data moved: \`$CHANGED_STATES\` (#233)." >> "$GITHUB_STEP_SUMMARY"
          fi
          # A broken detector doesn't fail the run — news is never worth blocking
          # a data deploy — but it doesn't get to pass quietly either (#234).
          if [ "$CHANGED_OUTCOME" = "failure" ]; then
            echo "::warning title=Per-state news sync skipped::Couldn't determine which states changed; no targeted news refresh ran (#233)."
            echo "⚠️ Couldn't work out which states' data changed, so no targeted news refresh ran this tick — any state that moved is serving its previous language until Monday's full build. See the \"Detect data-changed states\" step." >> "$GITHUB_STEP_SUMMARY"
          fi
          # Never let the deploy verdict imply the news build was healthy (#234).
          if [ "$NEWS_FAILED" = "true" ]; then
            echo "⚠️ The news build produced NO fresh summaries — the site kept the carried-forward copies. See the news-health job." >> "$GITHUB_STEP_SUMMARY"
          fi

  # Turn the run RED when a news build produced nothing fresh, so a dead token or
  # a PromptQL outage can't hide behind a green check (#234: it hid for a week).
  # Deliberately a separate job rather than a failing step in `refresh`:
  # post-social is `needs: refresh` WITHOUT always(), so failing `refresh` would
  # silently skip the social post on data-changed days. This way the data deploy
  # and the social release complete untouched — a news outage is loud, not
  # blocking — while the workflow still fails and GitHub notifies on it.
  news-health:
    needs: refresh
    if: always() && needs.refresh.outputs.news_failed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report the failed news build
        run: |
          echo "::error title=News build produced no fresh summaries::The news build failed for every state, so the site is still serving the previously-published summaries. Check PQL_NEWS_TOKEN (a malformed value returns 'HTTP 401 … Invalid token format') and PromptQL availability, then re-run with build_news=true."
          {
            echo "## News build failed"
            echo
            echo "Zero states built fresh — the site kept its carried-forward summaries, so **nothing was lost, but nothing was updated either**."
            echo
            echo "On a daily tick this was a targeted refresh of the states whose data changed (#233), which makes the gap concrete: those states shipped **new numbers with their previous prose**."
            echo
            echo "Check, in order:"
            echo "1. \`PQL_NEWS_TOKEN\` — a malformed value returns \`HTTP 401 … Invalid token format\` on every state."
            echo "2. PromptQL availability / the saved program."
            echo
            echo "Then re-run: \`gh workflow run data-refresh.yml -f stage=prod -f build_news=true\`"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

  # Finish the social release. A SEPARATE job from the deploy so the per-stage
  # YouTube token scoping (and any prod gate) covers only posting. Runs whenever
  # the data changed:
  #   • YouTube — auto-uploaded PRIVATELY to the channel behind this stage's
  #     YOUTUBE_REFRESH_TOKEN (unverified API project → private regardless, so
  #     nothing goes public unattended).
  #   • Instagram — MANUAL for now: no auto-post. The notify step emails the
  #     public video URL + suggested caption to post by hand, plus the YouTube
  #     Studio "publish" page for the upload above.
  # `post` (the default, and what the cron uses) does the upload + email;
  # `dry-run` prints the YouTube plan and sends no email.
  post-social:
    needs: refresh
    if: needs.refresh.outputs.data_changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The environment scopes the per-stage YOUTUBE_REFRESH_TOKEN (a staging run
    # can't read prod's token) and is where any prod approval gate would live.
    environment: ${{ inputs.stage || 'prod' }}
    permissions:
      id-token: write # OIDC: `sst shell` resolves the MapArchive bucket
      contents: read
    env:
      STAGE: ${{ inputs.stage || 'prod' }}
      # SES notification (manually-verified domain identity — see
      # docs/SOCIAL_UPLOAD.md). Set both as repo Variables; unset → the scripts
      # log the notification but send no email.
      NOTIFY_EMAIL_FROM: ${{ vars.NOTIFY_EMAIL_FROM }}
      NOTIFY_EMAIL_TO: ${{ vars.NOTIFY_EMAIL_TO }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      # Upload the vertical cut PRIVATELY to the prod channel. The script writes
      # the new video id to this step's outputs (youtube_id) so the notify step
      # can link the Studio publish page. --no-notify: the combined email below
      # is the single notification. `dry-run` prints the plan and uploads nothing.
      - name: Upload to YouTube (private)
        id: yt
        if: ${{ !cancelled() }}
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          SNAPSHOT_DATE: ${{ needs.refresh.outputs.snapshot_date }}
          WEB_DOMAIN: ${{ vars.WEB_DOMAIN }}
        run: |
          CONFIRM="--confirm"
          [ "${{ inputs.post_social }}" = "dry-run" ] && CONFIRM=""
          echo "post_social=${{ inputs.post_social || 'post (default)' }} → ${CONFIRM:-(dry run)}"
          pnpm "social:youtube:${STAGE}" -- $CONFIRM --no-notify --lang=en

      # One email with both manual steps: grab the public video + caption and
      # post the IG Reel by hand, and the YouTube Studio page to publish the
      # upload above. Runs even if the upload failed (no youtube_id → the email
      # still carries the IG link and points YouTube at the run logs); skipped
      # only on an explicit dry-run dispatch.
      - name: Notify — publish YouTube + post Instagram
        if: ${{ !cancelled() && inputs.post_social != 'dry-run' }}
        env:
          SNAPSHOT_DATE: ${{ needs.refresh.outputs.snapshot_date }}
          WEB_DOMAIN: ${{ vars.WEB_DOMAIN }}
        run: |
          pnpm "social:notify-ready:${STAGE}" -- \
            --lang=en --youtube-id "${{ steps.yt.outputs.youtube_id }}" \
            --archive-en "${{ needs.refresh.outputs.map_trend_archive_en }}" \
            --archive-es "${{ needs.refresh.outputs.map_trend_archive_es }}"
